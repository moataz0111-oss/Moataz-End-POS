<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#f97316" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="قائمة الطعام" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="description" content="اطلب طعامك المفضل بسهولة" />
    
    <!-- Apple Touch Icons - Customer App ONLY -->
    <link rel="apple-touch-icon" href="/icons/customer-icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/customer-icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/customer-icon-192.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/customer-icon-192.png" />
    
    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/customer-icon-192.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/customer-icon-192.png" />
    <link rel="shortcut icon" href="/icons/customer-icon-192.png" />
    
    <!-- Customer Manifest ONLY - No dynamic switching -->
    <link rel="manifest" href="/manifest-order.json" />
    
    <title>قائمة الطعام - اطلب الآن</title>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            height: 100%; 
            overflow: hidden;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .loader {
            text-align: center;
            color: white;
        }
        .logo {
            width: 80px;
            height: 80px;
            background: #000;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        .logo span {
            color: #f97316;
            font-size: 48px;
            font-weight: bold;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto 0;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loader">
        <div class="logo">
            <span>M</span>
        </div>
        <h1>قائمة الطعام</h1>
        <p>جارٍ التحميل...</p>
        <div class="spinner"></div>
    </div>
    
    <script>
        // Redirect to the React app menu
        setTimeout(function() {
            window.location.replace('/menu/default');
        }, 500);
    </script>
</body>
</html>
