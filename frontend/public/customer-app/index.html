<!doctype html>
<html lang="ar" dir="rtl">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
        <meta name="theme-color" content="#f97316" />
        <meta name="description" content="اطلب طعامك المفضل - قائمة الطعام" />
        
        <!-- PWA Meta Tags for iOS -->
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="default" />
        <meta name="apple-mobile-web-app-title" content="قائمة الطعام" />
        <meta name="mobile-web-app-capable" content="yes" />
        
        <!-- Apple Touch Icons for Customer App -->
        <link rel="apple-touch-icon" href="/icons/customer-icon-192.png" />
        <link rel="apple-touch-icon" sizes="152x152" href="/icons/customer-icon-192.png" />
        <link rel="apple-touch-icon" sizes="180x180" href="/icons/customer-icon-512.png" />
        <link rel="apple-touch-icon" sizes="167x167" href="/icons/customer-icon-192.png" />
        
        <!-- Favicons -->
        <link rel="icon" type="image/png" sizes="32x32" href="/icons/customer-icon-192.png" />
        <link rel="icon" type="image/png" sizes="16x16" href="/icons/customer-icon-192.png" />
        <link rel="shortcut icon" href="/icons/customer-icon-192.png" />
        
        <!-- Manifest للعملاء فقط -->
        <link rel="manifest" href="/customer-app/manifest.json" />
        
        <!-- Splash Screen for iOS -->
        <meta name="apple-touch-startup-image" href="/icons/customer-icon-512.png" />
        
        <title>قائمة الطعام - اطلب الآن</title>
        
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            html, body {
                height: 100%;
                overflow: hidden;
                background: #f97316;
            }
            #app-frame {
                width: 100%;
                height: 100%;
                border: none;
            }
            #loading-screen {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                color: white;
                z-index: 9999;
                transition: opacity 0.3s;
            }
            #loading-screen.hidden {
                opacity: 0;
                pointer-events: none;
            }
            .loader {
                width: 50px;
                height: 50px;
                border: 4px solid rgba(255,255,255,0.3);
                border-top-color: white;
                border-radius: 50%;
                animation: spin 1s linear infinite;
                margin-bottom: 20px;
            }
            @keyframes spin {
                to { transform: rotate(360deg); }
            }
            .logo {
                width: 100px;
                height: 100px;
                background: white;
                border-radius: 20px;
                display: flex;
                align-items: center;
                justify-content: center;
                margin-bottom: 20px;
                box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            }
            .logo svg {
                width: 50px;
                height: 50px;
                fill: #f97316;
            }
            #install-prompt {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                background: white;
                padding: 20px;
                border-radius: 20px 20px 0 0;
                box-shadow: 0 -5px 30px rgba(0,0,0,0.2);
                z-index: 10000;
                display: none;
            }
            #install-prompt.show {
                display: block;
            }
            #install-prompt h3 {
                color: #333;
                margin-bottom: 10px;
                font-size: 18px;
            }
            #install-prompt p {
                color: #666;
                font-size: 14px;
                line-height: 1.6;
            }
            #install-prompt .steps {
                margin-top: 15px;
                padding: 15px;
                background: #f5f5f5;
                border-radius: 10px;
            }
            #install-prompt .step {
                display: flex;
                align-items: center;
                gap: 10px;
                margin-bottom: 10px;
                color: #333;
                font-size: 14px;
            }
            #install-prompt .step:last-child {
                margin-bottom: 0;
            }
            #install-prompt .step-number {
                width: 24px;
                height: 24px;
                background: #f97316;
                color: white;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 12px;
                font-weight: bold;
            }
            #close-prompt {
                position: absolute;
                top: 15px;
                left: 15px;
                background: none;
                border: none;
                font-size: 24px;
                color: #999;
                cursor: pointer;
            }
        </style>
    </head>
    <body>
        <div id="loading-screen">
            <div class="logo">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path d="M11 9H9V2H7v7H5V2H3v7c0 2.12 1.66 3.84 3.75 3.97V22h2.5v-9.03C11.34 12.84 13 11.12 13 9V2h-2v7zm5-3v8h2.5v8H21V2c-2.76 0-5 2.24-5 4z"/>
                </svg>
            </div>
            <div class="loader"></div>
            <p>جاري تحميل القائمة...</p>
        </div>
        
        <iframe id="app-frame" src="" allow="geolocation"></iframe>
        
        <!-- Install Prompt for iOS -->
        <div id="install-prompt">
            <button id="close-prompt" onclick="document.getElementById('install-prompt').classList.remove('show')">×</button>
            <h3>📲 تثبيت التطبيق</h3>
            <p>لتجربة أفضل، أضف التطبيق للشاشة الرئيسية:</p>
            <div class="steps">
                <div class="step">
                    <span class="step-number">1</span>
                    <span>اضغط على زر المشاركة <strong>⬆️</strong> في الأسفل</span>
                </div>
                <div class="step">
                    <span class="step-number">2</span>
                    <span>اختر <strong>"إضافة للشاشة الرئيسية"</strong></span>
                </div>
                <div class="step">
                    <span class="step-number">3</span>
                    <span>اضغط <strong>"إضافة"</strong> في الأعلى</span>
                </div>
            </div>
        </div>
        
        <script>
            // قراءة parameter المطعم من URL
            var urlParams = new URLSearchParams(window.location.search);
            var restaurant = urlParams.get('restaurant');
            
            // تحديد رابط الإطار
            var menuUrl = '/menu';
            if (restaurant) {
                menuUrl = '/menu/' + restaurant;
                // حفظ المطعم المفضل
                localStorage.setItem('preferred_restaurant', restaurant);
            } else {
                // محاولة استرجاع المطعم المحفوظ
                var saved = localStorage.getItem('preferred_restaurant');
                if (saved) {
                    menuUrl = '/menu/' + saved;
                }
            }
            
            // تحميل الإطار
            var frame = document.getElementById('app-frame');
            var loading = document.getElementById('loading-screen');
            
            frame.src = menuUrl;
            
            frame.onload = function() {
                setTimeout(function() {
                    loading.classList.add('hidden');
                }, 500);
            };
            
            // إخفاء شاشة التحميل بعد 3 ثواني كحد أقصى
            setTimeout(function() {
                loading.classList.add('hidden');
            }, 3000);
            
            // إظهار تعليمات التثبيت على iOS إذا لم يكن التطبيق مثبتاً
            var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
            var isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
            
            if (isIOS && !isStandalone) {
                // إظهار التعليمات بعد ثانيتين
                setTimeout(function() {
                    // التحقق مما إذا كان المستخدم قد رأى التعليمات من قبل
                    var promptShown = localStorage.getItem('install_prompt_shown');
                    if (!promptShown) {
                        document.getElementById('install-prompt').classList.add('show');
                        localStorage.setItem('install_prompt_shown', 'true');
                    }
                }, 2000);
            }
        </script>
    </body>
</html>
