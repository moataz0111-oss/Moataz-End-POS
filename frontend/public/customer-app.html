<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#f97316" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="قائمة الطعام" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- Apple Touch Icons - Customer App -->
    <link rel="apple-touch-icon" href="/icons/customer-icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/customer-icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/customer-icon-192.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/customer-icon-192.png" />
    
    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/customer-icon-192.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/customer-icon-192.png" />
    
    <!-- Customer Manifest -->
    <link rel="manifest" href="/manifest-customer.json" />
    
    <title>قائمة الطعام - اطلب الآن</title>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .loader {
            text-align: center;
            color: white;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <p>جارٍ التحميل...</p>
    </div>
    
    <script>
        // Redirect to the React app
        window.location.replace('/menu/default');
    </script>
</body>
</html>
