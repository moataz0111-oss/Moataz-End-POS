<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#f97316" />
    <meta name="description" content="اطلب طعامك المفضل - قائمة الطعام" />
    
    <!-- PWA Meta Tags for iOS - هام جداً -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="قائمة الطعام" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="/icons/customer-icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/customer-icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/customer-icon-512.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/customer-icon-192.png" />
    
    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/customer-icon-192.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/customer-icon-192.png" />
    <link rel="shortcut icon" href="/icons/customer-icon-192.png" />
    
    <!-- Manifest للعملاء - مسار منفصل تماماً -->
    <link rel="manifest" href="/manifest-menu.json" />
    
    <!-- Splash Screen for iOS -->
    <meta name="apple-touch-startup-image" href="/icons/customer-icon-512.png" />
    
    <title>قائمة الطعام - اطلب الآن</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        #loading-screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 9999;
            background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
            transition: opacity 0.5s ease-out;
        }
        
        #loading-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }
        
        .logo-container {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .logo-container svg {
            width: 60px;
            height: 60px;
            fill: #f97316;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            font-size: 16px;
            font-weight: 500;
            opacity: 0.9;
        }
        
        /* iOS Install Banner */
        #ios-install-banner {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            padding: 20px;
            padding-bottom: calc(20px + env(safe-area-inset-bottom));
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.2);
            z-index: 10001;
            transform: translateY(100%);
            transition: transform 0.3s ease-out;
        }
        
        #ios-install-banner.show {
            transform: translateY(0);
        }
        
        .banner-content {
            max-width: 400px;
            margin: 0 auto;
        }
        
        .banner-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        
        .banner-title {
            font-size: 18px;
            font-weight: 700;
            color: #1f2937;
        }
        
        .banner-close {
            background: #f3f4f6;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 20px;
            color: #6b7280;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .banner-desc {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 16px;
            line-height: 1.5;
        }
        
        .install-steps {
            background: #fef3c7;
            border-radius: 12px;
            padding: 16px;
        }
        
        .step {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #92400e;
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .step:last-child {
            margin-bottom: 0;
        }
        
        .step-num {
            width: 24px;
            height: 24px;
            background: #f97316;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <!-- شاشة التحميل -->
    <div id="loading-screen">
        <div class="logo-container">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M11 9H9V2H7v7H5V2H3v7c0 2.12 1.66 3.84 3.75 3.97V22h2.5v-9.03C11.34 12.84 13 11.12 13 9V2h-2v7zm5-3v8h2.5v8H21V2c-2.76 0-5 2.24-5 4z"/>
            </svg>
        </div>
        <div class="spinner"></div>
        <p class="loading-text">جاري تحميل القائمة...</p>
    </div>
    
    <!-- iOS Install Banner -->
    <div id="ios-install-banner">
        <div class="banner-content">
            <div class="banner-header">
                <span class="banner-title">📲 ثبّت التطبيق</span>
                <button class="banner-close" onclick="closeBanner()">×</button>
            </div>
            <p class="banner-desc">للحصول على تجربة أفضل، أضف التطبيق للشاشة الرئيسية</p>
            <div class="install-steps">
                <div class="step">
                    <span class="step-num">1</span>
                    <span>اضغط على زر المشاركة <strong>⬆️</strong></span>
                </div>
                <div class="step">
                    <span class="step-num">2</span>
                    <span>اختر <strong>"إضافة للشاشة الرئيسية"</strong></span>
                </div>
                <div class="step">
                    <span class="step-num">3</span>
                    <span>اضغط <strong>"إضافة"</strong></span>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        (function() {
            // استخراج معرف المطعم من URL
            var pathParts = window.location.pathname.split('/').filter(Boolean);
            var restaurant = null;
            var searchParams = new URLSearchParams(window.location.search);
            
            // التحقق من وجود معرف المطعم في المسار أو search params
            if (pathParts.length > 1 && pathParts[0] === 'menu') {
                restaurant = pathParts[1];
            } else if (searchParams.get('r')) {
                restaurant = searchParams.get('r');
            }
            
            // حفظ المطعم في localStorage للاستخدام لاحقاً
            if (restaurant) {
                localStorage.setItem('customer_restaurant', restaurant);
            } else {
                // محاولة استرجاع المطعم المحفوظ
                restaurant = localStorage.getItem('customer_restaurant');
            }
            
            // بناء URL الهدف
            var targetUrl = '/menu';
            if (restaurant) {
                targetUrl = '/menu/' + restaurant;
            }
            
            // التحقق من أننا في وضع standalone (التطبيق مثبت)
            var isStandalone = window.matchMedia('(display-mode: standalone)').matches || 
                               window.navigator.standalone === true;
            
            // تسجيل حالة التطبيق
            console.log('[Customer PWA] isStandalone:', isStandalone);
            console.log('[Customer PWA] restaurant:', restaurant);
            console.log('[Customer PWA] targetUrl:', targetUrl);
            
            // إعادة التوجيه مباشرة إلى صفحة القائمة
            setTimeout(function() {
                window.location.replace(targetUrl);
            }, 100);
            
            // إظهار banner التثبيت لـ iOS إذا لم يكن مثبتاً
            var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
            if (isIOS && !isStandalone) {
                var shown = sessionStorage.getItem('ios_banner_shown');
                if (!shown) {
                    setTimeout(function() {
                        document.getElementById('ios-install-banner').classList.add('show');
                        sessionStorage.setItem('ios_banner_shown', 'true');
                    }, 2000);
                }
            }
        })();
        
        function closeBanner() {
            document.getElementById('ios-install-banner').classList.remove('show');
        }
    </script>
</body>
</html>
